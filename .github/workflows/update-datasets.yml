name: Update datasets

on:
  schedule:
    - cron: "30 6 * * 2"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-datasets
  cancel-in-progress: false

jobs:
  update:
    timeout-minutes: 5
    name: Fetch weekly market datasets
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Fetch VT weekly data
        run: npm run data:fetch:history
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          MARKET_DATA_SYMBOL: VT
          MARKET_DATA_SNAPSHOT_KIND: automated

      - name: Alert on VT latest trend proximity
        continue-on-error: true
        timeout-minutes: 2
        run: npm run data:alert:latest-trend
        env:
          MARKET_DATA_SYMBOL: VT
          MARKET_TREND_ALERT_THRESHOLD_PERCENT: ${{ vars.MARKET_TREND_ALERT_THRESHOLD_PERCENT_VT }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Fetch IWDA.LON weekly data
        run: npm run data:fetch:history
        env:
          ALPHA_VANTAGE_API_KEY: ${{ secrets.ALPHA_VANTAGE_API_KEY }}
          MARKET_DATA_SYMBOL: IWDA.LON
          MARKET_DATA_SNAPSHOT_KIND: automated

      - name: Alert on IWDA.LON latest trend proximity
        continue-on-error: true
        timeout-minutes: 2
        run: npm run data:alert:latest-trend
        env:
          MARKET_DATA_SYMBOL: IWDA.LON
          MARKET_TREND_ALERT_THRESHOLD_PERCENT: ${{ vars.MARKET_TREND_ALERT_THRESHOLD_PERCENT_IWDA }}
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}

      - name: Validate
        run: npm test

      - name: Commit dataset changes
        run: |
          git config user.name "yucj"
          git config user.email "nakts0123@gmail.com"
          git add data
          if git diff --cached --quiet; then
            echo "No dataset changes to commit."
          else
            git commit -m "chore(data): update weekly market datasets"
            git push
          fi
